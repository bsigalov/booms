name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR
        run: az acr build --registry orefbotacr --image oref-bot:latest .

      - name: Restart container
        run: az container restart --resource-group oref-bot-rg --name oref-bot
